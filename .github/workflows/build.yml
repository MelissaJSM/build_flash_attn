name: Build Flash Attention 2.8.3

on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest] 
        python-version: ['3.10']
        pt-env: 
          - { version: '2.10.0', install: 'pip install torch==2.10.0 torchvision==0.25.0 torchaudio==2.10.0 --index-url https://download.pytorch.org/whl/cu128' }
          - { version: '2.11.0', install: 'pip3 install torch torchvision --index-url https://download.pytorch.org/whl/cu128' }

    steps:
    # 0. Windows 긴 파일명 제한 해제
    - name: Enable Git Long Paths (Windows)
      if: runner.os == 'Windows'
      run: git config --system core.longpaths true

    # 1. flash-attn 공식 저장소 코드 가져오기
    - name: Checkout flash-attn repo
      uses: actions/checkout@v4
      with:
        repository: Dao-AILab/flash-attention
        ref: v2.8.3
        submodules: recursive

    # 2. Python 환경 설정
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. CUDA Toolkit 12.8.0 고정 설치 (✅ v0.2.35 최신 버전으로 업데이트!)
    - name: Setup CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.35
      with:
        cuda: '12.8.0' 

    # 4. 필수 도구 및 파이토치 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ninja packaging wheel build
        ${{ matrix.pt-env.install }}

    # 5. Linux 빌드 (메모리 초과 방지)
    - name: Build Wheel (Linux)
      if: runner.os == 'Linux'
      env:
        MAX_JOBS: 2 
        FLASH_ATTENTION_FORCE_BUILD: "TRUE"
      run: python setup.py bdist_wheel

    # 6. Windows 빌드 (안전 제일)
    - name: Build Wheel (Windows)
      if: runner.os == 'Windows'
      env:
        MAX_JOBS: 1 
        FLASH_ATTENTION_FORCE_BUILD: "TRUE"
      run: python setup.py bdist_wheel

    # 7. 빌드된 .whl 파일 업로드
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flash-attn-2.8.3-${{ matrix.os }}-py${{ matrix.python-version }}-pt${{ matrix.pt-env.version }}
        path: dist/*.whl
        overwrite: true
