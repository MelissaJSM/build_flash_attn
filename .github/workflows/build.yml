name: Build ExLlamaV3

on:
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10']
        pytorch-version: ['2.10.0', '2.11.0'] 

    steps:
    # 0. Windows 긴 파일명 제한 해제 (안전장치)
    - name: Enable Git Long Paths (Windows)
      if: runner.os == 'Windows'
      run: git config --system core.longpaths true

    # 1. exllamav3 저장소 가져오기
    - name: Checkout exllamav3 repo
      uses: actions/checkout@v4
      with:
        repository: turboderp-org/exllamav3

    # 2. Python 환경 설정
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. CUDA Toolkit 설치
    - name: Setup CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.19
      with:
        cuda: '12.1.0'

    # 4. PyTorch 및 필수 빌드 도구 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==${{ matrix.pytorch-version }} --index-url https://download.pytorch.org/whl/cu121
        pip install ninja packaging wheel build

    # 5. Linux 빌드 (메모리 터짐 방지)
    - name: Build Wheel (Linux)
      if: runner.os == 'Linux'
      env:
        MAX_JOBS: 2 
      run: python setup.py bdist_wheel

    # 6. Windows 빌드 (안전제일)
    - name: Build Wheel (Windows)
      if: runner.os == 'Windows'
      env:
        MAX_JOBS: 1 
      run: python setup.py bdist_wheel

    # 7. 빌드된 .whl 파일 업로드 (재실행 시 덮어쓰기 에러 해결!)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: exllamav3-${{ matrix.os }}-py${{ matrix.python-version }}-pt${{ matrix.pytorch-version }}
        path: dist/*.whl
        overwrite: true # ✅ 409 Conflict 에러를 방지하는 핵심 코드입니다.
