name: Build Flash Attention 2.8.3

on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest] # 우분투 22.04로 고정 (안정성)
        python-version: ['3.10']
        # 알려주신 설치 명령어를 그대로 실행하도록 세팅했습니다.
        pt-env: 
          - { version: '2.10.0', install: 'pip install torch==2.10.0 torchvision==0.25.0 torchaudio==2.10.0 --index-url https://download.pytorch.org/whl/cu128' }
          - { version: '2.11.0', install: 'pip3 install torch torchvision --index-url https://download.pytorch.org/whl/cu128' }

    steps:
    # 0. Windows 긴 파일명 제한 해제
    - name: Enable Git Long Paths (Windows)
      if: runner.os == 'Windows'
      run: git config --system core.longpaths true

    # 1. flash-attn 공식 저장소 코드 가져오기
    - name: Checkout flash-attn repo
      uses: actions/checkout@v4
      with:
        repository: Dao-AILab/flash-attention
        ref: v2.8.3
        submodules: recursive

    # 2. Python 환경 설정
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. CUDA Toolkit 12.8 무조건 고정 설치!
    - name: Setup CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.19
      with:
        cuda: '12.8.0' # cu128에 맞춰 12.8.0으로 고정했습니다.

    # 4. 필수 도구 및 파이토치 설치 (작성해주신 명령어 그대로 실행)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ninja packaging wheel build
        ${{ matrix.pt-env.install }}

    # 5. Linux 빌드 (메모리 초과 방지)
    - name: Build Wheel (Linux)
      if: runner.os == 'Linux'
      env:
        MAX_JOBS: 2 
        FLASH_ATTENTION_FORCE_BUILD: "TRUE"
      run: python setup.py bdist_wheel

    # 6. Windows 빌드 (안전 제일)
    - name: Build Wheel (Windows)
      if: runner.os == 'Windows'
      env:
        MAX_JOBS: 1 
        FLASH_ATTENTION_FORCE_BUILD: "TRUE"
      run: python setup.py bdist_wheel

    # 7. 빌드된 .whl 파일 업로드 (덮어쓰기 에러 방지)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flash-attn-2.8.3-${{ matrix.os }}-py${{ matrix.python-version }}-pt${{ matrix.pt-env.version }}
        path: dist/*.whl
        overwrite: true
