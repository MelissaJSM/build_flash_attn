name: Build Flash Attention 2.8.3

on:
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python-version: ['3.10']
        pytorch-version: ['2.10.0', '2.11.0'] 

    steps:
    # 0. Windows 긴 파일명 제한 해제 (Windows 빌드 에러 방지)
    - name: Enable Git Long Paths (Windows)
      if: runner.os == 'Windows'
      run: git config --system core.longpaths true

    # 1. flash-attn 공식 저장소의 2.8.3 버전 가져오기
    - name: Checkout flash-attn repo
      uses: actions/checkout@v4
      with:
        repository: Dao-AILab/flash-attention
        ref: v2.8.3
        submodules: recursive # C++ 서브모듈(cutlass 등) 필수 포함

    # 2. Python 환경 설정
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. CUDA Toolkit 설치 (컴파일에 필수)
    - name: Setup CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.19
      with:
        cuda: '12.1.0' 

    # 4. PyTorch 및 필수 빌드 도구 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==${{ matrix.pytorch-version }} --index-url https://download.pytorch.org/whl/cu121
        pip install ninja packaging wheel build

    # 5. Linux 빌드 (메모리 제한 설정)
    - name: Build Wheel (Linux)
      if: runner.os == 'Linux'
      env:
        MAX_JOBS: 2 # GitHub Actions 메모리 초과 방지
        FLASH_ATTENTION_FORCE_BUILD: "TRUE"
      run: python setup.py bdist_wheel

    # 6. Windows 빌드 (메모리 제한 설정)
    - name: Build Wheel (Windows)
      if: runner.os == 'Windows'
      env:
        MAX_JOBS: 1 # Windows 환경 안전제일
        FLASH_ATTENTION_FORCE_BUILD: "TRUE"
      run: python setup.py bdist_wheel

    # 7. 빌드된 .whl 파일 업로드
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flash-attn-2.8.3-${{ matrix.os }}-py${{ matrix.python-version }}-pt${{ matrix.pytorch-version }}
        path: dist/*.whl
        overwrite: true # ✅ 재실행 시 발생하는 409 Conflict 에러 방지
